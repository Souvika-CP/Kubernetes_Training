replicaCount: 2

image:
  repository: taskflow-registry:5000/taskflow
  tag: "v2"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: "taskflow-api"
  automount: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  host: taskflow.local
  appHost: app.local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: taskflow-registry:5000/taskflow-frontend
    tag: "v1"
    pullPolicy: IfNotPresent
  service:
    port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  logLevel: Information
  environment: Production
  jwtIssuer: taskflow-api
  jwtAudience: taskflow-clients
  jwtExpiryMinutes: "60"
  jwtKey: "taskflow-dev-secret-key-change-in-production-32chars"

otel:
  endpoint: "http://jaeger.monitoring.svc.cluster.local:4317"

pdb:
  enabled: true
  minAvailable: 1

mongodb:
  connectionString: "mongodb://admin:mongopassword@mongodb:27017/taskflow?authSource=admin"
  databaseName: taskflow

livenessProbe:
  httpGet:
    path: /health/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

startupProbe:
  httpGet:
    path: /health/startup
    port: 8080
  failureThreshold: 30
  periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654
  fsGroup: 1654

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
