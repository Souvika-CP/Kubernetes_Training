replicaCount: 3

config:
  environment: Production
  logLevel: Information
  # Override jwtKey with a strong secret in real AKS — inject via CI/CD from Key Vault
  jwtKey: "REPLACE-WITH-STRONG-SECRET-FROM-KEY-VAULT-32CHARS"

image:
  # Real AKS: replace with your ACR registry
  # repository: myregistry.azurecr.io/taskflow-api
  repository: taskflow-registry:5000/taskflow
  tag: "v1"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2
